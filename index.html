<!DOCTYPE html>
<html>
<head>
  <title>Online Class Test System</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">
  <h1>Online Class Test System</h1>

  <div id="start-screen">
    <h3>Select Subject</h3>

    <div class="grid">
  <button onclick="startQuiz('Programming Fundamentals')">Programming Fundamentals</button>
  <button onclick="startQuiz('Database Management System')">Database Management System</button>
  <button onclick="startQuiz('Operating System')">Operating System</button>
  <button onclick="startQuiz('Computer Networks')">Computer Networks</button>
  <button onclick="startQuiz('Java Programming')">Java Programming</button>
  <button onclick="startQuiz('Python Programming')">Python Programming</button>
  <button onclick="startQuiz('Web Technologies')">Web Technologies</button>
  <button onclick="startQuiz('Quantitative Aptitude')">Quantitative Aptitude</button>
  <button onclick="startQuiz('Data Structures')">Data Structures</button>
  <button onclick="startQuiz('Software Engineering')">Software Engineering</button>
</div>
  </div>

  <div id="quiz-screen" class="hide">
    <div class="top-bar">
      <span id="timer"></span>
      <span id="qno"></span>
    </div>

    <h2 id="question"></h2>
    <div id="options"></div>

    <div class="buttons">
      <button onclick="prevQuestion()">Previous</button>
      <button onclick="nextQuestion()">Next</button>
    </div>

    <button class="submit" onclick="submitQuiz()">Submit</button>
  </div>

  <div id="result-screen" class="hide">
    <h2 id="score"></h2>
    <button onclick="restartQuiz()">Restart</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
